<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India Financial Services Network — Competitive Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Inter:wght@400;500;600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0a0c0f;--paper:#f5f3ee;--surface:#ffffff;--surf2:#f0ede6;
  --bd:#d8d4cc;--bd2:#c4bfb5;
  --t1:#0a0c0f;--t2:#4a4640;--t3:#9a948a;
  --acc:#1a3a8f;--acc2:#e8420a;--green:#0a6640;
  --mono:'DM Mono',monospace;--head:'Syne',sans-serif;
  --sans:'Inter','DM Mono',system-ui,sans-serif;
}
body{background:var(--paper);color:var(--t1);font-family:var(--sans);font-size:13px;min-height:100vh;overflow:hidden}
.shell{display:grid;grid-template-columns:280px 1fr;grid-template-rows:56px 1fr;height:100vh}

/* TOPBAR */
.topbar{grid-column:1/-1;background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:space-between;padding:0 24px;gap:16px;z-index:10}
.topbar-title{font-family:var(--head);font-size:15px;font-weight:600;letter-spacing:.02em;color:var(--paper)}
.topbar-title span{color:#9ab0ff;font-weight:400}
.topbar-right{display:flex;align-items:center;gap:12px}
.api-wrap{display:flex;align-items:center;gap:8px}
.api-label{font-size:10px;color:#6a7090;white-space:nowrap}
.api-input{background:#1a1e2a;border:1px solid #2a3040;border-radius:4px;padding:5px 10px;color:#9ab0ff;font-family:var(--mono);font-size:10px;width:240px;outline:none}
.api-input::placeholder{color:#3a4060}
.api-input.ok{border-color:#2a6040;color:#5ad0a0}
.api-dot{width:6px;height:6px;border-radius:50%;background:#3a4060;flex-shrink:0;transition:background .2s}
.api-dot.ok{background:#5ad0a0}

/* SIDEBAR */
.sidebar{background:var(--surface);border-right:1px solid var(--bd);overflow-y:auto;padding:0}
.sb-section{padding:14px 16px;border-bottom:1px solid var(--bd)}
.sb-hdr{font-family:var(--head);font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.mode-hint{font-size:10px;color:var(--t3);line-height:1.7;margin-bottom:10px}
.mode-hint .b{color:var(--acc);font-weight:500}
.mode-hint .g{color:var(--green);font-weight:500}

/* PRESETS */
.presets{display:flex;flex-wrap:wrap;gap:4px}
.pb{font-size:9px;padding:3px 8px;border-radius:3px;border:1px solid var(--bd2);background:transparent;color:var(--t2);cursor:pointer;font-family:var(--mono);transition:all .1s}
.pb:hover{background:var(--acc);border-color:var(--acc);color:#fff}
.pb.red{color:var(--acc2);border-color:var(--bd)}
.pb.red:hover{background:var(--acc2);border-color:var(--acc2);color:#fff}

/* LENDER TOGGLES */
.cat-label{font-size:9px;font-family:var(--head);font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin:10px 0 4px;padding:0 2px}
.lt{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:4px;cursor:pointer;border:1px solid transparent;transition:all .08s;user-select:none}
.lt:hover{background:var(--surf2)}
.lt.ib{border-color:var(--lc);background:color-mix(in srgb,var(--lc) 8%,transparent)}
.lt.ic{border-color:color-mix(in srgb,var(--lc) 35%,transparent);background:color-mix(in srgb,var(--lc) 4%,transparent)}
.ri{font-size:8px;font-family:var(--head);font-weight:700;padding:1px 4px;border-radius:2px;min-width:28px;text-align:center;flex-shrink:0;letter-spacing:.05em}
.rb{background:color-mix(in srgb,var(--lc) 15%,transparent);color:var(--lc)}
.rc{background:color-mix(in srgb,var(--lc) 8%,transparent);color:color-mix(in srgb,var(--lc) 60%,var(--t3))}
.ro{background:transparent;color:transparent}
.lname{font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.lt.ib .lname,.lt.ic .lname{color:var(--t1)}
.lbr{font-size:9px;color:var(--t3);flex-shrink:0;font-family:var(--mono)}
.lsrc{font-size:8px;color:var(--t3);flex-shrink:0}
.lsrc.V{color:#0a6640}
.lsrc.E{color:#8a5a00}

/* STATE GRID */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}
.stb{font-size:9px;padding:4px 2px;border-radius:3px;border:1px solid var(--bd);background:transparent;color:var(--t3);cursor:pointer;font-family:var(--mono);text-align:center;transition:all .08s}
.stb:hover{border-color:var(--acc);color:var(--t1)}
.stb.act{background:var(--ink);border-color:var(--ink);color:var(--paper);font-weight:500}
.stb.hd{color:var(--t2);border-color:var(--bd2)}

/* MAIN */
.main{overflow-y:auto;background:var(--paper);display:flex;flex-direction:column}
.vtabs{display:flex;background:var(--surface);border-bottom:1px solid var(--bd);padding:0 20px;gap:0;flex-shrink:0}
.vt{font-size:11px;font-family:var(--head);font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:10px 14px;cursor:pointer;color:var(--t3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .1s}
.vt:hover{color:var(--t1)}
.vt.act{color:var(--acc);border-bottom-color:var(--acc)}
.ct{padding:20px;flex:1}

/* STATS ROW */
.sr{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.sc{background:var(--surface);border:1px solid var(--bd);border-radius:6px;padding:12px 14px}
.sc.base-card{border-color:var(--lc,var(--bd));border-width:2px}
.sv{font-size:22px;font-family:var(--head);font-weight:600;line-height:1}
.slb{font-size:9px;color:var(--t3);margin-top:4px;text-transform:uppercase;letter-spacing:.08em}

/* TABLES */
.tw{background:var(--surface);border:1px solid var(--bd);border-radius:6px;overflow:hidden;margin-bottom:14px}
.th{padding:10px 16px;background:var(--surf2);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.tt{font-family:var(--head);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t2)}
.ts{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:10px;font-family:var(--head);font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);padding:8px 14px;background:var(--surf2);border-bottom:1px solid var(--bd);text-align:left;white-space:nowrap}
td{padding:8px 14px;border-bottom:1px solid color-mix(in srgb,var(--bd) 50%,transparent);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surf2)}
.pill{font-size:9px;padding:2px 6px;border-radius:3px;font-family:var(--mono);white-space:nowrap;display:inline-block;margin:1px}
.hn{font-size:10px;font-family:var(--head);font-weight:600;padding:1px 6px;border-radius:3px;display:inline-block}
.h0{background:#f0ede6;color:#9a948a}
.h1{background:#e6eeff;color:#1a3a8f}
.h2{background:#c8d8ff;color:#0a2060}
.h3{background:#fff0e0;color:#7a4000}
.h4{background:#ffe0d0;color:#8a2010}
.h5{background:#ffd0c0;color:#c01000}

/* AI PANEL */
.aw{background:var(--surface);border:1px solid var(--bd);border-radius:6px;overflow:hidden;margin-bottom:14px}
.at{padding:10px 16px;background:var(--surf2);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.adot{width:7px;height:7px;border-radius:50%;background:var(--bd2);margin-right:8px;flex-shrink:0;transition:background .2s}
.adot.go{background:#5ad0a0}
.adot.spin{background:#f0a020;animation:pu 1s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.2}}
.atl{font-family:var(--head);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t2)}
.ab{padding:16px;font-size:12px;line-height:1.75;color:var(--t2);min-height:90px}
.ab p{margin-bottom:.7em}
.ab p:last-child{margin-bottom:0}
.ab strong{color:var(--t1);font-weight:500}
.ab .hint{color:var(--t3);font-style:italic}
.cur::after{content:'▋';animation:bl .7s step-end infinite;color:var(--acc)}
@keyframes bl{50%{opacity:0}}

/* BRANCH CHART */
.bar-chart{padding:16px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{font-size:10px;width:150px;text-align:right;flex-shrink:0;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:20px;background:var(--surf2);border-radius:3px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;justify-content:flex-end;padding-right:6px;min-width:30px}
.bar-val{font-size:9px;font-family:var(--head);font-weight:600;color:#fff;white-space:nowrap;mix-blend-mode:difference}
.bar-src{font-size:9px;color:var(--t3);width:30px;text-align:left;flex-shrink:0}
.bar-src.V{color:#0a6640}
.bar-src.E{color:#8a5a00}

/* TODO */
.todo-wrap{background:var(--surface);border:1px solid var(--bd);border-radius:6px;overflow:hidden}
.todo-top{padding:10px 16px;background:var(--surf2);display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.todo-top:hover{background:#e8e4dc}
.todo-body{padding:4px 16px 12px;border-top:1px solid var(--bd)}
.ti{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid color-mix(in srgb,var(--bd) 40%,transparent)}
.ti:last-child{border-bottom:none}
.tic{cursor:pointer;font-size:14px;line-height:1.3;flex-shrink:0;color:var(--t3);transition:color .1s}
.tic:hover{color:var(--t1)}
.ti.dn .tic{color:var(--green)}
.ti.dn .titx{text-decoration:line-through;color:var(--t3)}
.pr{font-size:8px;font-family:var(--head);font-weight:700;padding:2px 5px;border-radius:2px;flex-shrink:0;margin-top:2px;letter-spacing:.05em}
.prh{background:#ffe8e0;color:#c01000}
.prm{background:#fff4e0;color:#8a5000}
.prl{background:var(--surf2);color:var(--t3)}
.titx{font-size:11px;color:var(--t2);line-height:1.55}

/* EMPTY */
.em{padding:60px 40px;text-align:center;color:var(--t3);font-size:11px;line-height:2}
.em .big{font-family:var(--head);font-size:28px;font-weight:700;color:var(--bd2);margin-bottom:12px;letter-spacing:-.02em}

/* HELP TAB */
.help-wrap{max-width:820px;padding-bottom:40px}
.help-section{margin-bottom:28px}
.help-h1{font-family:var(--head);font-size:22px;font-weight:600;letter-spacing:-.02em;margin-bottom:6px;color:var(--t1)}
.help-h2{font-family:var(--head);font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--bd)}
.help-p{font-size:13px;line-height:1.75;color:var(--t2);margin-bottom:10px}
.help-p b{color:var(--t1);font-weight:500}
.help-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.hcard{background:var(--surface);border:1px solid var(--bd);border-radius:6px;padding:14px 16px}
.hcard-t{font-family:var(--head);font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px;color:var(--t1)}
.hcard p{font-size:12px;line-height:1.65;color:var(--t2);margin-bottom:5px}
.hcard p:last-child{margin-bottom:0}
.src-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px}
.src-tbl th{font-size:9px;font-family:var(--head);font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);padding:7px 10px;background:var(--surf2);border:1px solid var(--bd);text-align:left;white-space:nowrap}
.src-tbl td{padding:6px 10px;border:1px solid var(--bd);vertical-align:top;line-height:1.6;font-size:12px;color:var(--t2)}
.src-tbl tr:hover td{background:var(--surf2)}
.bv{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;background:#d4edda;color:#0a6640;font-family:var(--head);font-weight:700}
.be{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;background:#fff3cd;color:#7a4000;font-family:var(--head);font-weight:700}

/* STATE BREAKDOWN */
.sb-divider{display:flex;align-items:center;gap:10px;margin:20px 0 12px;padding-bottom:8px;border-bottom:2px solid var(--bd)}
.sb-divider:first-child{margin-top:0}
.sb-divider-label{font-family:var(--head);font-size:11px;font-weight:700;width:24px;height:24px;border-radius:50%;background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-divider-title{font-family:var(--head);font-size:13px;font-weight:600;color:var(--t1);letter-spacing:.02em}
.sb-divider-note{font-size:11px;color:var(--t3);flex:1;text-align:right}
.sb-card{margin-bottom:10px}
.cov-g{font-size:10px;font-family:var(--head);font-weight:700;padding:2px 6px;border-radius:3px;background:#d4edda;color:#0a6640;display:inline-block}
.cov-y{font-size:10px;font-family:var(--head);font-weight:700;padding:2px 6px;border-radius:3px;background:#fff3cd;color:#7a4000;display:inline-block}
.cov-r{font-size:10px;font-family:var(--head);font-weight:700;padding:2px 6px;border-radius:3px;background:#ffe8e0;color:#c01000;display:inline-block}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
</style>
</head>

  <div class="ct" id="CT"></div>
</main>

</div>

/* ── COMPUTED: town counts from TD{} ───────────── */
function computeTownCounts(){
  const out={};
  L.forEach(l=>{out[l.id]={};});
  Object.entries(TD).forEach(([stCode,towns])=>{
    towns.forEach(row=>{
      row.l.forEach(lid=>{
        if(!out[lid])out[lid]={};
        out[lid][stCode]=(out[lid][stCode]||0)+1;
      });
    });
  });
  return out;
}
const TC=computeTownCounts();

const hc=n=>['h0','h1','h2','h3','h4','h5'][Math.min(n,5)];

/* ── TOGGLE LOGIC ──────────────────────────────── */
function cycle(id){
  if(id===base){base=null;comps.add(id);}
  else if(comps.has(id)){comps.delete(id);}
  else{if(base)comps.add(base);base=id;comps.delete(id);}
  refreshToggles();draw();sched();
}
function refreshToggles(){
  L.forEach(l=>{
    const el=document.getElementById('lt'+l.id);if(!el)return;
    const iB=l.id===base,iC=comps.has(l.id);
    el.className='lt'+(iB?' ib':iC?' ic':'');
    el.style.setProperty('--lc',l.c);
    const ri=el.querySelector('.ri');
    if(ri){ri.className='ri '+(iB?'rb':iC?'rc':'ro');ri.textContent=iB?'BASE':iC?'CMP':'';}
  });
}
function preset(b,cs){base=b;comps=new Set(cs);refreshToggles();draw();sched();}
function setView(v,el){
  view=v;
  document.querySelectorAll('.vt').forEach(t=>t.classList.remove('act'));
  el.classList.add('act');draw();
}

/* ── STATE BREAKDOWN VIEW ──────────────────────── */
function buildStateBreak(lenders){
  const toShow=lenders.length?lenders:L;
  let h='';

  // ── SECTION A: Our town mapping ──
  h+='<div class="sb-divider"><span class="sb-divider-label">A</span><span class="sb-divider-title">Our town mapping</span><span class="sb-divider-note">Computed from town-level presence data we have compiled</span></div>';
  toShow.forEach(l=>{
    const tc=TC[l.id]||{};
    const states=Object.entries(tc).sort((a,b)=>b[1]-a[1]);
    const totalTowns=states.reduce((s,e)=>s+e[1],0);
    if(totalTowns===0){
      h+='<div class="tw sb-card"><div class="th"><span class="tt" style="color:'+l.c+'">'+l.n+'</span><span style="font-size:10px;color:var(--t3)">No town-level data mapped</span></div></div>';
      return;
    }
    h+='<div class="tw sb-card"><div class="th"><span class="tt" style="color:'+l.c+'">'+l.n+'</span><span style="font-size:10px;color:var(--t3)">'+totalTowns+' towns mapped across '+states.length+' states</span></div><div class="ts"><table><thead><tr><th>State</th><th style="text-align:right">Towns mapped</th><th>Towns</th></tr></thead><tbody>';
    states.forEach(([stCode,count])=>{
      const townNames=(TD[stCode]||[]).filter(r=>r.l.includes(l.id)).map(r=>r.t);
      const abbrev=townNames.length>5?townNames.slice(0,5).join(', ')+' +'+String(townNames.length-5)+' more':townNames.join(', ');
      h+='<tr><td style="font-weight:500">'+(SM[stCode]||stCode)+'</td><td style="text-align:right"><span class="hn '+hc(count)+'">'+count+'</span></td><td style="font-size:11px;color:var(--t2)">'+abbrev+'</td></tr>';
    });
    h+='</tbody></table></div></div>';
  });

  // ── SECTION B: Company-reported ──
  h+='<div class="sb-divider"><span class="sb-divider-label">B</span><span class="sb-divider-title">Company-reported branch counts</span><span class="sb-divider-note">From company filings, CARE ratings, investor presentations</span></div>';
  toShow.forEach(l=>{
    const srcBadge=l.src==='V'?'bv':'be';
    h+='<div class="tw sb-card"><div class="th"><span class="tt" style="color:'+l.c+'">'+l.n+'</span><span style="font-size:10px;color:var(--t3)">'+l.br.toLocaleString()+' total branches &middot; <span class="'+srcBadge+'">'+l.src+'</span> &middot; as of '+(l.srcDate||'&mdash;')+'</span></div>';
    if(l.stBr){
      const states=Object.entries(l.stBr).sort((a,b)=>b[1]-a[1]);
      h+='<div class="ts"><table><thead><tr><th>State</th><th style="text-align:right">Reported branches</th><th style="text-align:right">% of total</th></tr></thead><tbody>';
      states.forEach(([stCode,count])=>{
        const pct=((count/l.br)*100).toFixed(1);
        h+='<tr><td style="font-weight:500">'+(SM[stCode]||stCode)+'</td><td style="text-align:right;font-family:var(--mono)">'+count.toLocaleString()+'</td><td style="text-align:right;color:var(--t3)">'+pct+'%</td></tr>';
      });
      const stTotal=states.reduce((s,e)=>s+e[1],0);
      if(stTotal<l.br){
        h+='<tr style="background:var(--surf2)"><td style="font-weight:500;color:var(--t3)">Other / unallocated</td><td style="text-align:right;font-family:var(--mono);color:var(--t3)">'+(l.br-stTotal).toLocaleString()+'</td><td style="text-align:right;color:var(--t3)">'+(((l.br-stTotal)/l.br)*100).toFixed(1)+'%</td></tr>';
      }
      h+='</tbody></table></div>';
    } else {
      h+='<div style="padding:14px 16px;font-size:12px;color:var(--t3);line-height:1.7">State-level branch breakdown not published. Total: <strong style="color:var(--t1)">'+l.br.toLocaleString()+'</strong> branches across <strong style="color:var(--t1)">'+l.st.length+'</strong> states ('+l.st.join(', ')+')<br><span style="font-size:11px">Source: '+l.srcNote+'</span></div>';
    }
    h+='</div>';
  });

  // ── SECTION C: Data reconciliation ──
  const hasRecon=toShow.filter(l=>{const tc2=TC[l.id]||{};return Object.keys(tc2).length>0;});
  if(hasRecon.length){
    h+='<div class="sb-divider"><span class="sb-divider-label">C</span><span class="sb-divider-title">Data reconciliation</span><span class="sb-divider-note">Our town mapping vs company-reported &mdash; shows how much of their network our data covers</span></div>';
    hasRecon.forEach(l=>{
      const tc2=TC[l.id]||{};
      const states=Object.keys(tc2).sort((a,b)=>(tc2[b]||0)-(tc2[a]||0));
      if(!states.length)return;
      const hasStBr=!!l.stBr;
      h+='<div class="tw sb-card"><div class="th"><span class="tt" style="color:'+l.c+'">'+l.n+'</span><span style="font-size:10px;color:var(--t3)">Reported: '+l.br.toLocaleString()+' branches ('+(l.srcDate||'&mdash;')+') &middot; '+(hasStBr?'State-level data available':'Total only')+'</span></div><div class="ts"><table><thead><tr><th>State</th><th style="text-align:right">Towns mapped</th><th style="text-align:right">Branches reported</th><th style="text-align:right">Coverage</th></tr></thead><tbody>';
      states.forEach(stCode=>{
        const mapped=tc2[stCode]||0;
        const reported=hasStBr?(l.stBr[stCode]||null):null;
        let covHtml='&mdash;';
        if(reported){
          const pct=((mapped/reported)*100).toFixed(0);
          const cls=pct>=50?'cov-g':pct>=20?'cov-y':'cov-r';
          covHtml='<span class="'+cls+'">'+pct+'%</span>';
        }
        h+='<tr><td style="font-weight:500">'+(SM[stCode]||stCode)+'</td><td style="text-align:right"><span class="hn '+hc(mapped)+'">'+mapped+'</span></td><td style="text-align:right;font-family:var(--mono)">'+(reported!==null?reported.toLocaleString():'<span style="color:var(--t3)">&mdash;</span>')+'</td><td style="text-align:right">'+covHtml+'</td></tr>';
      });
      // states where reported but not mapped
      if(hasStBr){
        Object.keys(l.stBr).filter(s=>!tc2[s]).forEach(stCode=>{
          h+='<tr><td style="font-weight:500;color:var(--t3)">'+(SM[stCode]||stCode)+'</td><td style="text-align:right"><span class="hn h0">0</span></td><td style="text-align:right;font-family:var(--mono)">'+l.stBr[stCode].toLocaleString()+'</td><td style="text-align:right"><span class="cov-r">0%</span></td></tr>';
        });
      }
      h+='</tbody></table></div></div>';
    });
    h+='<div style="padding:12px 16px;font-size:11px;color:var(--t3);line-height:1.8;background:var(--surface);border:1px solid var(--bd);border-radius:6px;margin-bottom:14px"><strong style="color:var(--t2)">How to read coverage:</strong> &ldquo;Towns mapped&rdquo; = towns in our compiled dataset where this lender has at least one branch. &ldquo;Branches reported&rdquo; = company-disclosed branch count for that state. A coverage of 10% means our town data captures roughly 1 in 10 of their actual branch locations &mdash; the gap reflects sub-district/mandal-level branches we have not mapped, not absence.<br><span class="cov-g" style="font-size:10px">&ge;50%</span> good coverage &nbsp;<span class="cov-y" style="font-size:10px">20&ndash;49%</span> partial &nbsp;<span class="cov-r" style="font-size:10px">&lt;20%</span> significant gap</div>';
  }

  return h;
}

  }

    h+=`<div style="margin-top:12px;font-size:10px;color:var(--t3);line-height:1.8">
      <span style="color:var(--green);font-weight:500">V</span> = Verified from CARE ratings, investor presentations, company annual reports or official websites<br>
      <span style="color:#8a5a00;font-weight:500">E</span> = Estimated / corroborated from secondary sources — treat with caution<br>
      Hover any bar to see source note. Chola = 167 HL+LAP branches only (total group 1,387). L&T Finance = 850+ total company branches (HL/LAP is a product line — no standalone count). SBFC = 205 Mar-25 / 220 Jan-26.
    </div></div></div>`;
  }

  // STATE COVERAGE MATRIX
  if(view==='coverage'&&all.length){
    const sts=Object.keys(SM).filter(s=>all.some(l=>l.st.includes(s))).sort();
    h+=`<div class="tw"><div class="th"><span class="tt">State coverage matrix</span><span style="font-size:9px;color:var(--t3)">${sts.length} relevant states · ◀ = current state</span></div><div class="ts"><table><thead><tr><th>State</th>${all.map(l=>`<th style="text-align:center;color:${l.c}">${l.n}</th>`).join('')}<th style="text-align:center">n</th></tr></thead><tbody>`;
    sts.forEach(code=>{
      const cks=all.map(l=>l.st.includes(code));
      const n=cks.filter(Boolean).length;
      const cur=code===st;
      h+=`<tr${cur?' style="background:color-mix(in srgb,var(--acc) 6%,transparent)"':''}><td style="font-size:11px;white-space:nowrap;font-weight:${cur?'500':'400'}">${SM[code]||code}${cur?' <span style="font-size:9px;color:var(--acc)">◀</span>':''}</td>${all.map((l,i)=>`<td style="text-align:center">${cks[i]?`<span style="color:${l.c};font-size:13px">●</span>`:'<span style="color:var(--bd2)">○</span>'}</td>`).join('')}<td style="text-align:center"><span class="hn ${hc(n)}">${n}</span></td></tr>`;
    });
    h+=`</tbody></table></div></div>`;
  }

  // TOWN PRESENCE TABLE
  if(view==='towns'){
    if(!raw.length){
      h+=`<div class="tw"><div style="padding:20px;text-align:center;color:var(--t3);font-size:11px">No town data for ${sn}. States with data: AP TN KA TS RJ GJ MH MP UP DL KE PB OD WB HR CG JH BR</div></div>`;
    } else if(all.length){
      const sorted=[...towns].sort((a,b)=>b.cP.length-a.cP.length||b.bP-a.bP);
      h+=`<div class="tw"><div class="th"><span class="tt">Town presence — ${sn}</span><span style="font-size:9px;color:var(--t3)">● base &nbsp;◆ comparator &nbsp;sorted by overlap density</span></div><div class="ts"><table><thead><tr><th>Town</th>${bO?`<th style="text-align:center;color:${bO.c};width:70px">${bO.n}</th>`:''}<th>Comparators present</th><th style="text-align:right;width:44px">n</th></tr></thead><tbody>`;
      sorted.forEach(({t,bP,cP})=>{
        const pills=cP.map(l=>`<span class="pill" style="background:color-mix(in srgb,${l.c} 10%,transparent);color:${l.c}">◆ ${l.n}</span>`).join('');
        h+=`<tr><td style="font-weight:500;white-space:nowrap">${t}</td>${bO?`<td style="text-align:center">${bP?`<span style="color:${bO.c};font-size:14px">●</span>`:'<span style="color:var(--bd2)">○</span>'}</td>`:''}<td>${pills||`<span style="color:var(--t3);font-size:10px">none</span>`}</td><td style="text-align:right"><span class="hn ${hc(cP.length)}">${cP.length}</span></td></tr>`;
      });
      h+=`</tbody></table></div></div>`;
    }
  }

  h+=buildTodo();
  ct.innerHTML=h;
}

function buildTodo(){
  const pc={h:'prh',m:'prm',l:'prl'},pl={h:'HIGH',m:'MED',l:'LOW'};
  const pend=TODOS.filter(t=>!t.done).length,done=TODOS.length-pend;
  return `<div class="todo-wrap"><div class="todo-top" onclick="flipTodo()"><div style="display:flex;align-items:center;gap:8px"><span style="font-family:var(--head);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t2)">Research to-do</span><span style="font-size:9px;padding:2px 7px;border-radius:10px;background:var(--surf2);border:1px solid var(--bd2);color:var(--t3)">${pend} open · ${done} done</span></div><span style="font-size:10px;color:var(--t3)">${tdOpen?'▲':'▼'}</span></div>${tdOpen?`<div class="todo-body">${TODOS.map(t=>`<div class="ti${t.done?' dn':''}"><span class="tic" onclick="tickTodo(${t.id})">${t.done?'✓':'☐'}</span><span class="pr ${pc[t.p]}">${pl[t.p]}</span><span class="titx">${t.txt}</span></div>`).join('')}<div style="padding-top:6px;font-size:10px;color:var(--t3)">Click ☐ to tick off. Items persist during session.</div></div>`:''}</div>`;
}
function flipTodo(){tdOpen=!tdOpen;const tw=document.querySelector('.todo-wrap');if(tw)tw.outerHTML=buildTodo();}
function tickTodo(id){const t=TODOS.find(x=>x.id===id);if(t)t.done=!t.done;const tw=document.querySelector('.todo-wrap');if(tw)tw.outerHTML=buildTodo();}

      body:JSON.stringify({model:'claude-opus-4-5',max_tokens:900,stream:true,messages:[{role:'user',content:prompt}]})
    });
    if(!res.ok){const e=await res.text();throw new Error(`API ${res.status}: ${e.slice(0,100)}`);}
    ab.innerHTML='<div id="ST" class="cur"></div>';

    const reader=res.body.getReader(),dec=new TextDecoder();
    let full='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      for(const line of dec.decode(value).split('\n')){
        if(!line.startsWith('data: '))continue;
        const d=line.slice(6).trim();if(d==='[DONE]')continue;

      }
    }
    if(se){se.className='';se.innerHTML=fmt(full);}
  }catch(e){
